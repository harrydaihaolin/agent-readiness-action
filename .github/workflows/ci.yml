name: ci

# Two layers of testing:
# 1. Lint action.yml + workflow files via actionlint.
# 2. Run the action against tests/test-good-repo and assert it produces
#    a non-trivial score (>= 50 — anything lower means the smoke fixture
#    or the wrapper itself is broken).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -version
      - name: Run actionlint
        run: ./actionlint action.yml .github/workflows/*.yml

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Run inner Python make test (smoke fixture)
        working-directory: tests/test-good-repo
        run: make test
      - name: Run agent-readiness-action against test-good-repo
        id: ar
        uses: ./
        with:
          path: tests/test-good-repo
          fail-below: 50
          json: true
          sarif: true
          upload-sarif: false
      - name: Assert score is set
        run: |
          if [ -z "${{ steps.ar.outputs.score }}" ]; then
            echo "Action did not emit a score output." >&2
            exit 1
          fi
          echo "score=${{ steps.ar.outputs.score }}"

  self-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install "agent-readiness>=1.1.0"
      # An Action repo can't legitimately satisfy manifest.detected,
      # manifest.lockfile_present, or typecheck.configured (those checks
      # are for code projects). 80 is the realistic ceiling.
      - run: agent-readiness scan . --fail-below 80
